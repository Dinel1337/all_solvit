[tox]
envlist = py312
isolated_build = false
skip_missing_interpreters = true

[testenv]
skip_install = true
deps = uv
setenv =
    PYTHONPATH = {toxinidir}/src
    TESTING = 1
    RESTART_PG = 0

allowlist_externals = rm

commands_pre =
    rm -rf .venv
    uv venv --python 3.12 --seed
    uv pip install \
        pytest>=9.0.3,<10.0.0 \
        pytest-asyncio>=1.3.0,<2.0.0 \
        httpx>=0.28.1,<0.29.0 \
        sqlalchemy>=2.0.48,<3.0.0 \
        asyncpg>=0.31.0,<0.32.0 \
        pytest-order>=1.3.0,<2.0.0 \
        pytest-rerunfailures>=16.1,<17.0 \
        pytest-xdist>=3.8.0,<4.0.0 \
        fastapi>=0.135.2,<0.136.0 \
        bcrypt>=5.0.0,<6.0.0 \
        pyjwt>=2.12.1,<3.0.0 \
        email-validator>=2.3.0,<3.0.0 \
        redis>=7.4.0,<8.0.0 \
        pydantic-settings>=2.13.1,<3.0.0 \
        uvicorn>=0.42.0,<0.43.0 \
        websockets>=16.0,<17.0 \
        aiogram>=3.26.0,<4.0.0 \
        aiosqlite>=0.22.1,<0.23.0

commands = uv run pytest tests/{posargs} -v --tb=short

[testenv:core]
commands = uv run pytest tests/_core/ -v

[testenv:api]
commands = uv run pytest tests/api_tracker/ -v

[testenv:quiz]
commands = uv run pytest tests/quiz_platform/ -v

[testenv:binance]
commands = uv run pytest tests/chat_bot_binance/ -v