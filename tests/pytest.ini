[pytest]
filterwarnings =
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore::DeprecationWarning:httpx._client
    ignore:'HTTP_422_UNPROCESSABLE_ENTITY' is deprecated:DeprecationWarning
    ignore:Setting per-request cookies=:DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*logger.*:UserWarning
    
addopts = 
    -p no:warnings
    --tb=short
    -rA
    --no-header
    # --cache-clear
    --reruns=3
    --reruns-delay=0.5
    --maxfail=1

norecursedirs = .venv venv env __pycache__
asyncio_mode = auto

 # йобаное говно ломающее все тесты ОСТАВИТЬ ЕЕ function
asyncio_default_fixture_loop_scope = function